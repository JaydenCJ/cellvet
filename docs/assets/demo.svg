<svg xmlns="http://www.w3.org/2000/svg" width="740" height="430" viewBox="0 0 740 430" font-family="Menlo, Consolas, monospace" font-size="14">
  <rect width="740" height="430" rx="10" fill="#101418"/>
  <circle cx="24" cy="22" r="6" fill="#ff5f56"/>
  <circle cx="44" cy="22" r="6" fill="#ffbd2e"/>
  <circle cx="64" cy="22" r="6" fill="#27c93f"/>
  <text x="370" y="27" fill="#8b949e" text-anchor="middle" font-size="12">cellvet — will this notebook survive Restart &amp; Run All?</text>
  <g fill="#c9d1d9">
    <text x="24" y="62"><tspan fill="#7ee787">$</tspan> cellvet check examples/stale_state.ipynb</text>
    <text x="24" y="92" fill="#79c0ff">examples/stale_state.ipynb</text>
    <text x="24" y="118">  cell 1, line 1: <tspan fill="#f85149">N202 defined-after-use [error]</tspan></text>
    <text x="24" y="138" fill="#8b949e">    'revenue' is used here but only defined in cell 2 (In [2]), which comes</text>
    <text x="24" y="158" fill="#8b949e">    later; it worked in your session only because cell 2 had already run</text>
    <text x="24" y="188">  cell 4, line 1: <tspan fill="#d29922">H301 order-dependent-binding [warning]</tspan></text>
    <text x="24" y="208" fill="#8b949e">    'tax_rate' comes from cell 3 (In [1]) on a fresh run, but this cell ran</text>
    <text x="24" y="228" fill="#8b949e">    against the value from cell 5 (In [3]); its output may not reproduce</text>
    <text x="24" y="258">  cell 6, line 1: <tspan fill="#f85149">N201 undefined-name [error]</tspan></text>
    <text x="24" y="278" fill="#8b949e">    'build_report' is never defined anywhere in the notebook</text>
    <text x="24" y="312"><tspan fill="#f85149">3 errors</tspan>, <tspan fill="#d29922">5 warnings</tspan>, 1 info in 1 notebook</text>
    <text x="24" y="352"><tspan fill="#7ee787">$</tspan> cellvet check examples/clean.ipynb</text>
    <text x="24" y="378"><tspan fill="#7ee787">no hidden-state issues in 1 notebook</tspan></text>
    <text x="24" y="404" fill="#8b949e"># no kernel, no execution, no dependencies — just ast + json</text>
  </g>
</svg>
